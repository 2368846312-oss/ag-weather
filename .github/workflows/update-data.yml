name: 更新VHI和降水数据

on:
  schedule:
    - cron: '0 2 * * *'        # 每天 UTC 2:00（北京 10:00）自动运行
  workflow_dispatch:            # 允许在 GitHub 网页上手动触发

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: 检出仓库
      uses: actions/checkout@v3

    - name: 安装 Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: 安装依赖
      run: pip install openpyxl requests

    - name: 运行 VHI 数据抓取
      run: python noaa_vhi_download.py

    - name: 运行降水数据抓取
      run: python 降水数据抓取_完整版.py

    - name: 提交新数据
      run: |
        git config user.name "GitHub Action"
        git config user.email "action@github.com"
        git add .
        git diff --staged --quiet || git commit -m "自动更新数据 $(date +%Y-%m-%d)"
        git push
