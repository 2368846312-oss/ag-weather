name: 自动更新天气图

on:
  schedule:
    - cron: "23 10 * * *"   # UTC 0:00 → 北京时间 08:00
    - cron: "38 11 * * *"   # UTC 7:00  → 北京时间 15:00
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 关键：给 token 写权限，否则定时时推不上去
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 配置 Git 身份
        run: |
          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install requests pillow

      - name: 运行爬虫
        run: python weather.py

      - name: 提交并推送
        uses: EndBug/add-and-commit@v9
        with:
          message: "自动更新天气图"
          add: "."
          push: true
